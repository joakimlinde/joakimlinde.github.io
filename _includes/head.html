<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>
    {% if page.title == "Home" %}
    &commat;{{ site.title }}
    {% else %}
    {{ page.title }} &bull; {{ site.title }}
    {% endif %}
  </title>
  {% if page.title == "Home" %}
  <meta property="og:title" content="{{ site.title }}" />
  {% if site.posts.first.photo %}
  <meta property="og:image" content="{{ site.baseurl }}/photos/{{ site.posts.first.photo }}" />
  {% endif %}
  {% else %}
  <meta property="og:title" content="{{ page.title }}" />
  {% if page.photo %}
  <meta property="og:image" content="{{ site.baseurl }}/photos/{{ page.photo }}" />
  {% endif %}
  {% endif %}
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/styles.css">
  <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ site.baseurl }}/atom.xml">
  <script src="{{ site.baseurl }}/assets/js/maillinks.js"></script>
</head>
