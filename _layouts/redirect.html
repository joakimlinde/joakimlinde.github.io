<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>
  {% if page.title == "Home" %}
  {{ site.title }}
  {% else %}
  {{ page.title }} {{ site.title }}
  {% endif %}
  </title>
    
  <meta http-equiv="refresh" content="0; url={{ site.baseurl }}{{ page.redirect }}">
</head>

<body>
<p><a href="{{ site.baseurl }}{{ page.redirect }}">Redirect</a></p>
</body>
</html>
